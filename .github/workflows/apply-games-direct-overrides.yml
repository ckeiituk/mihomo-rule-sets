name: Apply games-direct overrides

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply_games_direct_overrides.py
      - other/games-direct-overrides.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply local games-direct overrides
        run: python3 .github/workflows/apply_games_direct_overrides.py

      - name: Commit generated games-direct.yaml
        id: commit
        run: |
          git add other/games-direct.yaml

          if git diff --cached --quiet; then
            echo "games-direct.yaml is already up to date"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: regenerate games-direct overrides"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push fork main
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:${{ github.ref_name }}
