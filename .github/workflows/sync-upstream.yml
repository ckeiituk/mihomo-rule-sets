name: Sync upstream

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main
        run: |
          git remote add upstream https://github.com/legiz-ru/mihomo-rule-sets.git || git remote set-url upstream https://github.com/legiz-ru/mihomo-rule-sets.git
          git fetch upstream main
          git checkout main
          git merge --no-edit upstream/main

      - name: Apply local games-direct overrides
        run: python3 .github/workflows/apply_games_direct_overrides.py

      - name: Commit local override changes
        run: |
          git add .github/workflows/apply_games_direct_overrides.py .github/workflows/sync-upstream.yml other/games-direct-overrides.txt other/games-direct.yaml

          if git diff --cached --quiet; then
            echo "No local override changes to commit"
            exit 0
          fi

          git commit -m "chore: sync upstream"

      - name: Push fork main
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            echo "origin/main is already up to date"
            exit 0
          fi

          git push origin main
